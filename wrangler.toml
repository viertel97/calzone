name = "calzone"
main = "src/index.js"
compatibility_date = "2026-01-01"
assets = { directory = "public" }

[vars]
TARGET_HOST = "outlook.office365.com"
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = false

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
